---
name: Nightly check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  linkCheck:
    name: Run link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: LinkCheck
        uses: ConsenSys/github-actions/docs-link-check@68e0677c7c567c2447fc82d43dc4fceb4b31a680
        with:
          CONFIG_FILE: .linkspector.yml

  slackNotification:
    needs: linkCheck
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions: {}   # zero scopes
    steps:
      - name: Slack Notification
        uses: ConsenSys/github-actions/slack-notify@68e0677c7c567c2447fc82d43dc4fceb4b31a680
        with:
          SLACK_CHANNEL: doc-ci-alerts
          SLACK_COLOR: danger
          SLACK_TITLE: Linea docs nightly build - Failure
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          MSG_MINIMAL: true
