---
name: Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel older runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {} # lock everything by default (least-privilege)

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read  # least-privilege for this job only
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build docs
        uses: Consensys/github-actions/docs-build@8e207ec2ad53d90ab419d39d03084fa93e04d190 # main as of 2026-06-08
